<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body {
    font-family: -apple-system, "Inter", system-ui, sans-serif;
    margin: 0;
    padding: 20px;
    color: #1a1a1a;
    background: #fff;
  }
  h1 {
    font-size: 14px;
    margin: 0 0 4px;
    font-weight: 600;
  }
  .file {
    font-size: 11px;
    color: #777;
    margin-bottom: 14px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  button {
    width: 100%;
    padding: 10px;
    border: 0;
    border-radius: 6px;
    background: #18a0fb;
    color: #fff;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
  }
  button:hover { background: #0d8de0; }
  button[disabled] { background: #aaa; cursor: not-allowed; }
  button.secondary {
    background: transparent;
    color: #777;
    border: 1px solid #e0e0e0;
    margin-top: 8px;
    font-weight: 400;
  }
  button.secondary:hover { background: #f5f5f5; }
  .status {
    margin-top: 14px;
    padding: 10px;
    border-radius: 6px;
    font-size: 12px;
    line-height: 1.5;
    display: none;
  }
  .status.ok { background: #e8f7ee; color: #196d3a; display: block; }
  .status.err { background: #fde8e8; color: #8a1c1c; display: block; }
  .footer {
    margin-top: 16px;
    font-size: 10px;
    color: #999;
    line-height: 1.5;
  }
  a { color: #18a0fb; text-decoration: none; }
</style>
</head>
<body>
  <h1>Kiub README Sync</h1>
  <div class="file" id="file">loading…</div>

  <button id="sync">Sync README from registry</button>
  <button class="secondary" id="close">Close</button>

  <div class="status" id="status"></div>

  <div class="footer">
    Source of truth: <code>kiub-figma-index</code> repo on GitHub.<br>
    Edit the YAML overlay there to update what this README says.
  </div>

<script>
const $ = (id) => document.getElementById(id);

parent.postMessage({ pluginMessage: { type: "init" } }, "*");

$("sync").addEventListener("click", () => {
  $("sync").disabled = true;
  $("status").className = "status";
  $("status").textContent = "";
  parent.postMessage({ pluginMessage: { type: "sync" } }, "*");
});
$("close").addEventListener("click", () => {
  parent.postMessage({ pluginMessage: { type: "close" } }, "*");
});

window.onmessage = (e) => {
  const msg = e.data.pluginMessage;
  if (!msg) return;
  if (msg.type === "context") {
    $("file").textContent = msg.fileName;
  } else if (msg.type === "done") {
    $("status").className = "status ok";
    $("status").textContent = msg.message;
    $("sync").disabled = false;
  } else if (msg.type === "error") {
    $("status").className = "status err";
    $("status").textContent = msg.message;
    $("sync").disabled = false;
  }
};
</script>
</body>
</html>
