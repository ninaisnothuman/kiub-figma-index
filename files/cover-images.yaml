      - ["Opera (browser new tab)", "Same new-tab hero adapted for the Opera add-on listing. 'Install now to experience a beautiful new tab'."]
  - heading: "Below the ARCHIVE label"
    subtitle: "These pages sit under the ARCHIVE separator in the page list. Treat as inactive unless you confirm otherwise with the design owner."
    items:
